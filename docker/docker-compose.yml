version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../models:/app/models

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["streamlit", "run", "streamlit_app/app.py", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    depends_on:
      - api